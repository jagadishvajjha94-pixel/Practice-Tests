# PrepIndia FRONTEND — nginx on EC2 (UI on 3000, proxy /api to backend if set)
# Install: sudo cp deploy/nginx.conf /etc/nginx/conf.d/prepindia-frontend.conf
# Optional: set BACKEND_UPSTREAM to backend EC2 private IP:3001

upstream prepindia_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Uncomment and set when using split EC2 (frontend + backend):
# upstream prepindia_api {
#     server 10.0.1.50:3001;
# }

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /_next/static/ {
        proxy_pass http://prepindia_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Split mode: proxy API to backend EC2 (uncomment upstream + block below)
    # location /api/ {
    #     proxy_pass http://prepindia_api;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 120s;
    # }

    location / {
        proxy_pass http://prepindia_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
