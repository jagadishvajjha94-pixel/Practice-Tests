# NGINX reverse proxy — place at /etc/nginx/sites-available/prepindia
# Terminates TLS at ALB; NGINX forwards to local PM2 cluster on port 3000.

upstream prepindia_next {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name exam.yourcollege.edu.in;

    client_max_body_size 10m;

    # Health check for ALB target group
    location = /api/health {
        proxy_pass http://prepindia_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location / {
        proxy_pass http://prepindia_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Static assets — long cache (CloudFront can also serve these)
    location /_next/static/ {
        proxy_pass http://prepindia_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
